name: ClickUp Sprint Task Analysis

on:
  workflow_dispatch:

jobs:
  analyze-sprint-tasks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch tasks in Review state from ClickUp
        id: fetch_tasks
        env:
          CLICKUP_TOKEN: ${{ secrets.CLICKUP_TOKEN }}
          CLICKUP_LIST_ID: ${{ secrets.CLICKUP_LIST_ID }}
        run: |
          echo "Fetching tasks in 'review' state from ClickUp..."

          RESPONSE=$(curl --get -s \
            --url "https://api.clickup.com/api/v2/list/${CLICKUP_LIST_ID}/task" \
            --header "Authorization: ${CLICKUP_TOKEN}" \
            --data-urlencode "statuses[]=review")

          echo "Raw response received."

          TASK_NAMES=$(echo "$RESPONSE" | jq -r '[.tasks[].name] | join("\n- ")')

          if [ -z "$TASK_NAMES" ]; then
            echo "No tasks found in review state."
            exit 1
          fi

          FULL_TASKS=$(echo "$RESPONSE" | jq -r '.tasks[] | "Task: \(.name)\nDescription: \(.description // "No description")\nPriority: \(.priority.priority // "none")\n---"')

          echo "Tasks found:"
          echo "$FULL_TASKS"

          echo "FULL_TASKS<<EOF" >> $GITHUB_ENV
          echo "$FULL_TASKS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Analyze tasks with Groq AI
        id: groq_analysis
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          PROMPT="You are a senior software engineering lead. For each task below, write a SHORT review card using this exact format:

          ### [Task name]
          **What:** One sentence max.
          **Steps:** Max 3 bullet points, one line each.
          **Risk:** One line only.
          **Done when:** One line only.

          Be very concise. No long paragraphs. Each card should be readable in 10 seconds.

          Tasks:
          $FULL_TASKS"

          ESCAPED_PROMPT=$(echo "$PROMPT" | jq -Rs .)

          GROQ_RESPONSE=$(curl -s \
            -X POST \
            "https://api.groq.com/openai/v1/chat/completions" \
            -H "Authorization: Bearer ${GROQ_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"llama-3.3-70b-versatile\",
              \"messages\": [{\"role\": \"user\", \"content\": $ESCAPED_PROMPT}],
              \"max_tokens\": 2048
            }")

          echo "Groq response received."

          REPORT=$(echo "$GROQ_RESPONSE" | jq -r '.choices[0].message.content')

          if [ -z "$REPORT" ] || [ "$REPORT" = "null" ]; then
            echo "Error: No report generated. Full response:"
            echo "$GROQ_RESPONSE"
            exit 1
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DATE_LABEL=$(date -u +"%d %b %Y")

          FULL_REPORT="# Sprint Review — ${DATE_LABEL}
          _Generated: ${TIMESTAMP}_

          ${REPORT}"

                    echo "$FULL_REPORT" > sprint-review-report.md
                    echo "REPORT_DATE=${DATE_LABEL}" >> $GITHUB_ENV

                    echo "Report generated successfully."
                    cat sprint-review-report.md

      - name: Upload Sprint Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sprint-review-report
          path: sprint-review-report.md
          retention-days: 30

      - name: Post Report as GitHub Actions Summary
        run: |
          echo "## Sprint Review — $(date -u +"%d %b %Y")" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat sprint-review-report.md >> $GITHUB_STEP_SUMMARY

      - name: Send email notification
        env:
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_APP_PASS: ${{ secrets.SMTP_APP_PASS }}
          NOTIFY_EMAILS: ${{ secrets.NOTIFY_EMAILS }}
          REPORT_DATE: ${{ env.REPORT_DATE }}
          PLATFORM_NAME: ${{ secrets.PLATFORM_NAME }}
        run: |
          pip install markdown --break-system-packages --quiet

          python3 << 'PYEOF'
          import os
          import smtplib
          import markdown
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          smtp_email   = os.environ["SMTP_EMAIL"].strip()
          smtp_pass    = os.environ["SMTP_APP_PASS"].strip()
          notify_emails = [e.strip() for e in os.environ["NOTIFY_EMAILS"].split(",") if e.strip()]
          report_date  = os.environ.get("REPORT_DATE", "Sprint Review")
          platform_name = os.environ.get("PLATFORM_NAME", "Platform").strip()

          with open("sprint-review-report.md", "r") as f:
              md_content = f.read()

          # Convert markdown task cards to styled HTML cards
          html_content = markdown.markdown(md_content, extensions=["extra"])

          # Replace <h3> with styled task cards
          import re

          def make_card(match):
              title = match.group(1).strip()
              return f'''
              <div style="background:#ffffff;border:1px solid #e2e8f0;border-radius:12px;padding:20px 24px;margin-bottom:16px;border-left:4px solid #6366f1;">
                <h3 style="margin:0 0 12px;font-size:15px;font-weight:600;color:#1e1b4b;">{title}</h3>
              '''

          html_content = re.sub(r'<h3>(.*?)</h3>', make_card, html_content, flags=re.DOTALL)
          html_content = html_content.replace('<hr>', '</div>')

          # Count tasks
          task_count = len(re.findall(r'Task:', open("sprint-review-report.md").read()))

          html_body = f"""<!DOCTYPE html>
          <html>
          <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
          <body style="margin:0;padding:0;background:#f1f5f9;font-family:'Segoe UI',Arial,sans-serif;">

            <table width="100%" cellpadding="0" cellspacing="0" style="background:#f1f5f9;padding:40px 0;">
              <tr><td align="center">
                <table width="620" cellpadding="0" cellspacing="0" style="max-width:620px;width:100%;">

                  <!-- Header -->
                  <tr>
                    <td style="background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);border-radius:16px 16px 0 0;padding:36px 40px;text-align:center;">
                      <p style="margin:0 0 6px;font-size:12px;font-weight:600;letter-spacing:2px;color:#c4b5fd;text-transform:uppercase;">{platform_name} Platform</p>
                      <h1 style="margin:0 0 8px;font-size:26px;font-weight:700;color:#ffffff;">New Release</h1>
                      <p style="margin:0;font-size:14px;color:#ddd6fe;">Sprint tasks ready for review &mdash; {report_date}</p>
                    </td>
                  </tr>

                  <!-- Stats bar -->
                  <tr>
                    <td style="background:#4338ca;padding:14px 40px;">
                      <table width="100%" cellpadding="0" cellspacing="0">
                        <tr>
                          <td style="text-align:center;border-right:1px solid #6366f1;padding:0 16px;">
                            <p style="margin:0;font-size:22px;font-weight:700;color:#ffffff;">{task_count}</p>
                            <p style="margin:2px 0 0;font-size:11px;color:#a5b4fc;text-transform:uppercase;letter-spacing:1px;">Tasks</p>
                          </td>
                          <td style="text-align:center;border-right:1px solid #6366f1;padding:0 16px;">
                            <p style="margin:0;font-size:22px;font-weight:700;color:#34d399;">&#10003;</p>
                            <p style="margin:2px 0 0;font-size:11px;color:#a5b4fc;text-transform:uppercase;letter-spacing:1px;">In Review</p>
                          </td>
                          <td style="text-align:center;padding:0 16px;">
                            <p style="margin:0;font-size:22px;font-weight:700;color:#ffffff;">{report_date}</p>
                            <p style="margin:2px 0 0;font-size:11px;color:#a5b4fc;text-transform:uppercase;letter-spacing:1px;">Date</p>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>

                  <!-- Body -->
                  <tr>
                    <td style="background:#f8fafc;padding:32px 40px;">

                      <p style="margin:0 0 24px;font-size:14px;color:#475569;line-height:1.6;">
                        Hello team, <br><br>
                        A new <strong style="color:#4f46e5;">{platform_name}</strong> release is ready. Below is the AI-generated sprint review summary for all tasks currently in the <strong>Review</strong> state. Please check each card before merging.
                      </p>

                      <!-- Task cards -->
                      {html_content}

                    </td>
                  </tr>

                  <!-- Footer -->
                  <tr>
                    <td style="background:#1e1b4b;border-radius:0 0 16px 16px;padding:24px 40px;text-align:center;">
                      <p style="margin:0 0 6px;font-size:13px;font-weight:600;color:#a5b4fc;">{platform_name} Engineering</p>
                      <p style="margin:0;font-size:11px;color:#6366f1;">Generated automatically by GitHub Actions &middot; ClickUp Sprint Analysis</p>
                    </td>
                  </tr>

                </table>
              </td></tr>
            </table>

          </body>
          </html>"""

          # Send to each recipient individually
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(smtp_email, smtp_pass)
              for recipient in notify_emails:
                  msg = MIMEMultipart("alternative")
                  msg["Subject"] = f"New Release — {platform_name} Sprint Review {report_date}"
                  msg["From"]    = f"{platform_name} Engineering <{smtp_email}>"
                  msg["To"]      = recipient
                  msg.attach(MIMEText(md_content, "plain"))
                  msg.attach(MIMEText(html_body, "html"))
                  server.sendmail(smtp_email, recipient, msg.as_string())
                  print(f"Email sent to {recipient}")

          print(f"Done — {len(notify_emails)} email(s) sent.")
          PYEOF